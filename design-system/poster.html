<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poster — Majed Almasmoum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #0A0A0A; display: flex; align-items: center; justify-content: center; font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }

  .stage {
    width: 100vmin;
    max-width: 700px;
    aspect-ratio: 2/3;
    position: relative;
    overflow: hidden;
    background: #0C0A09;
    box-shadow: 0 32px 80px rgba(0,0,0,0.8);
  }

  /* Grain texture */
  .stage::before {
    content: '';
    position: absolute; inset: 0; z-index: 10; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.04;
  }

  /* Background geometric grid lines */
  .bg-lines {
    position: absolute; inset: 0; z-index: 1;
    background-image:
      linear-gradient(rgba(201,169,110,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,169,110,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Vignette */
  .vignette {
    position: absolute; inset: 0; z-index: 2; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.75) 100%);
  }

  /* Large faded M monogram background */
  .bg-monogram {
    position: absolute;
    bottom: -8%;
    right: -5%;
    z-index: 3;
    font-family: 'Cormorant Garamond', serif;
    font-size: 65vmin;
    font-weight: 300;
    font-style: italic;
    color: transparent;
    -webkit-text-stroke: 1px rgba(140,26,26,0.12);
    line-height: 1;
    pointer-events: none;
    user-select: none;
  }

  /* Artwork placeholder */
  .artwork-frame {
    position: absolute;
    top: 12%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 4;
    width: 58%;
    aspect-ratio: 3/4;
    border: 1px solid rgba(201,169,110,0.25);
    background: #141210;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .artwork-frame::after {
    content: '';
    position: absolute; inset: 8px;
    border: 1px solid rgba(201,169,110,0.08);
  }

  /* Gold top rule */
  .top-rule {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #C9A96E 40%, #C9A96E 60%, transparent);
    z-index: 6;
  }

  /* Content overlay */
  .content {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 6;
    padding: 0 7% 7%;
    background: linear-gradient(to top, rgba(8,6,5,0.98) 0%, rgba(8,6,5,0.85) 55%, transparent 100%);
  }

  .divider-line {
    width: 32px;
    height: 1px;
    background: #9A7A4A;
    margin-bottom: 16px;
  }

  .eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(8px, 1.2vmin, 11px);
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #9A7A4A;
    margin-bottom: 10px;
  }

  .title-ar {
    font-family: 'Amiri', serif;
    font-size: clamp(28px, 6vmin, 48px);
    font-weight: 400;
    color: #F5F0E8;
    line-height: 1.3;
    margin-bottom: 4px;
  }

  .title-en {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(13px, 2.5vmin, 20px);
    font-weight: 300;
    font-style: italic;
    color: #A09A90;
    letter-spacing: 0.04em;
    margin-bottom: 20px;
  }

  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-top: 1px solid rgba(42,39,36,0.8);
    padding-top: 14px;
    margin-top: 4px;
  }

  .brand-block { display: flex; flex-direction: column; gap: 4px; }
  .brand-monogram {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(20px, 3.5vmin, 30px);
    font-weight: 400;
    font-style: italic;
    color: #B22222;
    line-height: 1;
  }
  .brand-name {
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(6px, 1vmin, 9px);
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #5A5450;
  }

  .edition-block { text-align: left; }
  .edition-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(22px, 4vmin, 34px);
    font-weight: 300;
    color: rgba(201,169,110,0.5);
    line-height: 1;
  }
  .edition-label {
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(6px, 1vmin, 9px);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #5A5450;
  }

  /* Top header strip */
  .header-strip {
    position: absolute;
    top: 5%; left: 7%; right: 7%;
    z-index: 6;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header-label {
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(7px, 1vmin, 9px);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #5A5450;
  }
  .header-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #9A7A4A;
  }
</style>
</head>
<body>
<div class="stage">
  <div class="top-rule"></div>
  <div class="bg-lines"></div>
  <div class="vignette"></div>
  <div class="bg-monogram">M</div>

  <!-- Header strip -->
  <div class="header-strip">
    <span class="header-label">معرض · Gallery</span>
    <div class="header-dot"></div>
    <span class="header-label">2024 — Collection</span>
  </div>

  <!-- Central artwork frame -->
  <div class="artwork-frame">
    <svg width="30%" viewBox="0 0 80 80" fill="none" stroke="#C9A96E" stroke-width="0.5" opacity="0.35">
      <rect x="4" y="4" width="72" height="72"/>
      <rect x="14" y="14" width="52" height="52"/>
      <line x1="4" y1="4" x2="14" y2="14"/>
      <line x1="76" y1="4" x2="66" y2="14"/>
      <line x1="4" y1="76" x2="14" y2="66"/>
      <line x1="76" y1="76" x2="66" y2="66"/>
      <circle cx="40" cy="40" r="16"/>
      <line x1="40" y1="24" x2="40" y2="56"/>
      <line x1="24" y1="40" x2="56" y2="40"/>
    </svg>
  </div>

  <!-- Content bottom -->
  <div class="content">
    <div class="divider-line"></div>
    <div class="eyebrow">فن الطباعة ثلاثية الأبعاد · 3D Printed Fine Art</div>
    <div class="title-ar">معرض ماجد المصموم</div>
    <div class="title-en">Majed Almasmoum — Selected Works</div>

    <div class="meta-row">
      <div class="brand-block">
        <div class="brand-monogram">M</div>
        <div class="brand-name">Majed Almasmoum</div>
      </div>
      <div class="edition-block">
        <div class="edition-num">2024</div>
        <div class="edition-label">Collection</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
