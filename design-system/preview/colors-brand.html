<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { background: var(--bg-void); padding: 24px; display: flex; flex-wrap: wrap; gap: 12px; }
.swatch { width: 120px; }
.swatch-block { height: 72px; border: 1px solid rgba(255,255,255,0.06); }
.swatch-label { font-family: var(--font-body); font-size: 11px; color: var(--fg-secondary); margin-top: 6px; letter-spacing: 0.04em; }
.swatch-hex { font-family: var(--font-mono); font-size: 10px; color: var(--fg-tertiary); }
.group-label { width: 100%; font-family: var(--font-body); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-tertiary); padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-top: 4px; }
</style></head>
<body>
<div class="group-label" style="flex-basis:100%">Brand Crimson</div>
<div class="swatch"><div class="swatch-block" style="background:#6A1010"></div><div class="swatch-label">crimson-dark</div><div class="swatch-hex">#6A1010</div></div>
<div class="swatch"><div class="swatch-block" style="background:#8C1A1A"></div><div class="swatch-label">crimson</div><div class="swatch-hex">#8C1A1A</div></div>
<div class="swatch"><div class="swatch-block" style="background:#B22222"></div><div class="swatch-label">crimson-light</div><div class="swatch-hex">#B22222</div></div>
<div class="swatch"><div class="swatch-block" style="background:rgba(140,26,26,0.12); border:1px solid #8C1A1A33"></div><div class="swatch-label">crimson-subtle</div><div class="swatch-hex">rgba crimson 12%</div></div>

<div class="group-label" style="flex-basis:100%">Brand Gold</div>
<div class="swatch"><div class="swatch-block" style="background:#9A7A4A"></div><div class="swatch-label">gold-muted</div><div class="swatch-hex">#9A7A4A</div></div>
<div class="swatch"><div class="swatch-block" style="background:#C9A96E"></div><div class="swatch-label">gold</div><div class="swatch-hex">#C9A96E</div></div>
<div class="swatch"><div class="swatch-block" style="background:#DFC08A"></div><div class="swatch-label">gold-light</div><div class="swatch-hex">#DFC08A</div></div>
<div class="swatch"><div class="swatch-block" style="background:rgba(201,169,110,0.12); border:1px solid #C9A96E33"></div><div class="swatch-label">gold-subtle</div><div class="swatch-hex">rgba gold 12%</div></div>
</body></html>
