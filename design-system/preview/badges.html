<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { background: var(--bg-void); padding: 28px; display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-start; }
.group { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; flex-basis: 100%; }
.group-label { font-family: var(--font-body); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-tertiary); flex-basis: 100%; }
.badge {
  font-family: var(--font-body);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 2px;
}
.badge-crimson { background: var(--crimson-subtle); color: #E05555; border: 1px solid var(--crimson); }
.badge-gold { background: var(--gold-subtle); color: var(--gold); border: 1px solid var(--gold-muted); }
.badge-neutral { background: #1E1C1C; color: var(--fg-secondary); border: 1px solid var(--border); }
.badge-outline { background: transparent; color: var(--fg-secondary); border: 1px solid var(--border); }
.badge-dot { display: inline-flex; align-items: center; gap: 6px; }
.badge-dot::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.tag {
  font-family: var(--font-body);
  font-size: 11px;
  padding: 5px 12px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--fg-secondary);
  cursor: pointer;
  transition: all 200ms ease;
}
.tag:hover { border-color: var(--gold-muted); color: var(--gold); }
.tag-active { border-color: var(--gold-muted); color: var(--gold); background: var(--gold-subtle); }
</style></head>
<body>
<div class="group">
  <div class="group-label">Status Badges</div>
  <span class="badge badge-gold">Available</span>
  <span class="badge badge-crimson">Sold Out</span>
  <span class="badge badge-neutral">Commission Only</span>
  <span class="badge badge-outline">Limited Edition</span>
</div>
<div class="group">
  <div class="group-label">Dot Badges</div>
  <span class="badge badge-gold badge-dot" style="color:var(--gold)">In Stock</span>
  <span class="badge badge-crimson badge-dot" style="color:#E05555">Unavailable</span>
  <span class="badge badge-neutral badge-dot">Processing</span>
</div>
<div class="group">
  <div class="group-label">Filter Tags</div>
  <span class="tag tag-active">All Works</span>
  <span class="tag">Sculpture</span>
  <span class="tag">Portrait</span>
  <span class="tag">Abstract</span>
  <span class="tag">Commission</span>
</div>
</body></html>
