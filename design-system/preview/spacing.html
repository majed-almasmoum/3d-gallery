<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { background: var(--bg-void); padding: 28px; display: flex; flex-wrap: wrap; gap: 28px; align-items: flex-start; }
.section { }
.section-label { font-family: var(--font-body); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-tertiary); margin-bottom: 14px; }
.space-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.space-block { background: var(--gold-subtle); border: 1px solid var(--gold-muted); height: 16px; flex-shrink: 0; }
.space-label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-tertiary); width: 80px; }
.space-value { font-family: var(--font-mono); font-size: 10px; color: var(--fg-secondary); }
.radius-row { display: flex; gap: 12px; align-items: center; }
.radius-box { width: 48px; height: 48px; background: var(--bg-elevated); border: 1px solid var(--border-highlight); }
.radius-label { font-family: var(--font-body); font-size: 10px; color: var(--fg-tertiary); text-align: center; margin-top: 6px; }
</style></head>
<body>
<div class="section">
  <div class="section-label">Spacing Scale</div>
  <div class="space-row"><div class="space-label">--space-1</div><div class="space-block" style="width:4px"></div><div class="space-value">4px</div></div>
  <div class="space-row"><div class="space-label">--space-2</div><div class="space-block" style="width:8px"></div><div class="space-value">8px</div></div>
  <div class="space-row"><div class="space-label">--space-3</div><div class="space-block" style="width:12px"></div><div class="space-value">12px</div></div>
  <div class="space-row"><div class="space-label">--space-4</div><div class="space-block" style="width:16px"></div><div class="space-value">16px</div></div>
  <div class="space-row"><div class="space-label">--space-6</div><div class="space-block" style="width:24px"></div><div class="space-value">24px</div></div>
  <div class="space-row"><div class="space-label">--space-8</div><div class="space-block" style="width:32px"></div><div class="space-value">32px</div></div>
  <div class="space-row"><div class="space-label">--space-12</div><div class="space-block" style="width:48px"></div><div class="space-value">48px</div></div>
  <div class="space-row"><div class="space-label">--space-16</div><div class="space-block" style="width:64px"></div><div class="space-value">64px</div></div>
  <div class="space-row"><div class="space-label">--space-24</div><div class="space-block" style="width:96px"></div><div class="space-value">96px</div></div>
</div>
<div class="section">
  <div class="section-label">Corner Radius</div>
  <div class="radius-row">
    <div><div class="radius-box" style="border-radius:0"></div><div class="radius-label">none · 0px<br>structural</div></div>
    <div><div class="radius-box" style="border-radius:2px"></div><div class="radius-label">sm · 2px<br>badges</div></div>
    <div><div class="radius-box" style="border-radius:9999px;width:48px"></div><div class="radius-label">full<br>pills</div></div>
  </div>
</div>
</body></html>
